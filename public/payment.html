<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Оплата курса | CyberSquare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-light">

<header class="cs-header">
  <div class="container py-3 d-flex align-items-center justify-content-between">
    <div class="cs-logo">CyberSquare</div>
  </div>
</header>

<main class="container py-5" style="max-width: 700px;">
  <div class="card cs-card p-4">
    <h1 class="h4 mb-3">Демо-оплата курса</h1>

    <div id="paymentInfo" class="mb-4 text-muted">
      Загрузка информации...
    </div>

    <div class="d-flex gap-2 flex-wrap">
      <button id="payBtn" class="btn btn-primary">Подтвердить оплату</button>
      <button id="cancelBtn" class="btn btn-outline-danger">Отменить</button>
      <a href="cabinet.html" class="btn btn-outline-secondary">Назад в кабинет</a>
    </div>
  </div>
</main>

<script>
  const token = localStorage.getItem('token');
  const params = new URLSearchParams(window.location.search);
  const enrollmentId = params.get('enrollment_id');

  const paymentInfo = document.getElementById('paymentInfo');
  const payBtn = document.getElementById('payBtn');
  const cancelBtn = document.getElementById('cancelBtn');

  if (!token) {
    location.href = 'login.html';
  }

  if (!enrollmentId) {
    paymentInfo.textContent = 'Не передан enrollment_id.';
    payBtn.disabled = true;
    cancelBtn.disabled = true;
  } else {
    paymentInfo.innerHTML = `
      <p><b>Номер записи:</b> ${enrollmentId}</p>
      <p>Для демонстрации дипломного проекта используется тестовая оплата без реального списания денежных средств.</p>
    `;
  }

  payBtn.addEventListener('click', async () => {
    const res = await fetch('/api/payments/pay/' + enrollmentId, {
      method: 'PATCH',
      headers: {
        'Authorization': 'Bearer ' + token
      }
    });

    const json = await res.json();

    if (!res.ok) {
      alert(json.error || 'Ошибка оплаты');
      return;
    }

    alert('Оплата успешно подтверждена!');
    location.href = 'cabinet.html';
  });

  cancelBtn.addEventListener('click', async () => {
    const res = await fetch('/api/payments/cancel/' + enrollmentId, {
      method: 'PATCH',
      headers: {
        'Authorization': 'Bearer ' + token
      }
    });

    const json = await res.json();

    if (!res.ok) {
      alert(json.error || 'Ошибка отмены');
      return;
    }

    alert('Оплата отменена');
    location.href = 'cabinet.html';
  });
</script>

</body>
</html>
