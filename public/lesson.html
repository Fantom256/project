<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Урок | CyberSquare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<header class="cs-header">
  <div class="container cs-header-inner">
    <a href="index.html" class="cs-logo">CyberSquare</a>

    <nav id="nav-links" class="cs-nav">
      <ul id="nav-ul" class="cs-nav-list"></ul>
    </nav>
  </div>
</header>

<main class="container py-5 flex-grow-1">
  <div class="card cs-card p-4 p-md-5 mb-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
      <div>
        <div class="text-muted mb-2" id="lessonMeta">Урок</div>
        <h1 class="h3 mb-0" id="lessonTitle">Загрузка урока...</h1>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <a href="#" id="backToCourseBtn" class="btn btn-outline-secondary">К курсу</a>
        <a href="cabinet.html" class="btn btn-outline-primary">В кабинет</a>
      </div>
    </div>
  </div>

  <div class="card cs-card p-4 p-md-5 mb-4">
    <div id="lessonContent" class="lesson-content">
      <div class="text-muted">Загрузка содержимого урока...</div>
    </div>
  </div>

  <div class="card cs-card p-4 p-md-5 mb-4" id="codePracticeBlock">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="h5 mb-0">Практика</h2>
      <span class="text-muted small">Напиши код и проверь решение</span>
    </div>

    <div class="mb-3">
      <label for="codeEditor" class="form-label">Python-код</label>
      <textarea
        id="codeEditor"
        class="form-control"
        rows="12"
        placeholder="Напишите Python-код здесь..."
        style="font-family: Consolas, monospace;"
      ></textarea>
    </div>

    <div class="d-flex gap-2 flex-wrap mb-3">
      <button id="checkCodeBtn" class="btn btn-primary" type="button">Проверить код</button>
      <button id="clearCodeBtn" class="btn btn-outline-secondary" type="button">Очистить</button>
    </div>

    <div id="checkResult" class="alert d-none mb-0" role="alert"></div>
  </div>

  <div class="card cs-card p-4">
    <div id="lessonRewardBox" class="alert alert-success d-none mb-3"></div>
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
      <div id="lessonStatus" class="text-muted">
        Статус урока: не определён
      </div>

      <div class="d-flex gap-2 flex-wrap">
  <a href="#" id="prevLessonBtn" class="btn btn-outline-secondary d-none">Предыдущий урок</a>
  <button id="nextLessonBtn" class="btn btn-primary d-none" type="button">Следующий урок</button>
</div>
    </div>
  </div>
</main>

<div class="modal fade" id="lessonRewardModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="lessonRewardModalTitle">Награда за урок</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>

      <div class="modal-body" id="lessonRewardModalBody">
        <div class="text-muted">Награда загружается...</div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
          Остаться
        </button>
        <button type="button" class="btn btn-primary" id="lessonRewardContinueBtn">
          Продолжить
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="lessonToast" class="toast align-items-center border-0 text-bg-dark" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="lessonToastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
    </div>
  </div>
</div>

<script src="/js/nav.js" defer></script>
<div id="footer-holder"></div>
<script src="/js/footer.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/lesson.js" defer></script>

</body>
</html>
