<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Курс | CyberSquare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<header class="cs-header">
  <div class="container cs-header-inner">
    <a href="index.html" class="cs-logo">CyberSquare</a>

    <nav id="nav-links" class="cs-nav">
      <ul id="nav-ul" class="cs-nav-list"></ul>
    </nav>
  </div>
</header>

<main class="container py-5 flex-grow-1">
  <div class="card cs-card p-4 p-md-5 mb-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
      <div>
        <h1 class="h3 mb-2" id="courseTitle">Курс</h1>
        <div class="text-muted" id="courseSubtitle">Загрузка информации...</div>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <a href="cabinet.html" class="btn btn-outline-secondary">В кабинет</a>
        <a href="courses.html" class="btn btn-outline-primary">К курсам</a>
      </div>
    </div>
  </div>

  <div class="card cs-card p-4 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="h5 m-0">Прогресс курса</h2>
      <span class="badge text-bg-light" id="progressText">0%</span>
    </div>

    <div class="progress" style="height: 20px;">
      <div
        id="progressBar"
        class="progress-bar"
        role="progressbar"
        style="width: 0%;"
        aria-valuenow="0"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        0%
      </div>
    </div>

    <div class="text-muted mt-2" id="progressDetails">
      Выполнено 0 из 0 уроков
    </div>
  </div>

  <div class="card cs-card p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="h5 m-0">Уроки курса</h2>
      <button class="btn btn-sm btn-outline-secondary" onclick="loadCoursePage()">Обновить</button>
    </div>

    <div id="lessonsList" class="d-flex flex-column gap-3">
      <div class="text-muted">Загрузка уроков...</div>
    </div>
  </div>
</main>

<script src="/js/nav.js" defer></script>
<div id="footer-holder"></div>
<script src="/js/footer.js" defer></script>
<script src="/js/course-view.js" defer></script>

</body>
</html>
