<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход | CyberSquare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-light">

<header class="cs-header">
  <div class="container cs-header-inner">
    <a href="index.html" class="cs-logo">CyberSquare</a>

    <nav id="nav-links" class="cs-nav">
      <ul id="nav-ul" class="cs-nav-list"></ul>
    </nav>
    <button id="themeToggleBtn" class="btn btn-sm btn-outline-secondary" type="button">
  🌙 Тёмная
</button>
  </div>
</header>

<main class="container py-5" style="max-width:520px;">
  <div class="card cs-card p-4">
    <h1 class="h4 mb-3">Вход</h1>

    <form id="loginForm" class="d-flex flex-column gap-3">
      <input class="form-control" type="email" id="email" placeholder="Email" required>
      <input class="form-control" type="password" id="password" placeholder="Пароль" required>
      <button class="btn btn-primary" type="submit">Войти</button>
    </form>

    <div class="text-muted mt-3">
      Нет аккаунта? <a href="register.html">Регистрация</a>
    </div>
  </div>
</main>

<script src="/js/nav.js" defer></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const body = {
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value
  };

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const json = await res.json().catch(() => ({}));

    if (!res.ok) {
      alert(json.error || 'Ошибка входа');
      return;
    }

    const token = json.token || json.access_token || json.accessToken;
    const user = json.user || {};

    const userId = user.user_id ?? json.user_id ?? null;
    const fullName = user.full_name ?? json.full_name ?? '';
    const role = user.role ?? json.role ?? '';

    if (token) localStorage.setItem('token', token);
    if (userId != null) localStorage.setItem('user_id', String(userId));
    if (fullName) localStorage.setItem('full_name', fullName);
    if (role) localStorage.setItem('role', role);

    // Служебные роли всегда отправляем в их кабинет
    if (role === 'admin') {
      localStorage.removeItem('redirect_after_login');
      location.href = 'admin.html';
      return;
    }

    if (role === 'manager') {
      localStorage.removeItem('redirect_after_login');
      location.href = 'manager.html';
      return;
    }

    if (role === 'support') {
      localStorage.removeItem('redirect_after_login');
      location.href = 'support.html';
      return;
    }

    // Обычного пользователя можно вернуть туда, откуда он пришёл
    const back = localStorage.getItem('redirect_after_login');
    if (back) {
      localStorage.removeItem('redirect_after_login');
      location.href = back;
      return;
    }

    location.href = 'cabinet.html';
  } catch (err) {
    alert('Ошибка сети/сервера: ' + err.message);
  }
});
</script>
<script src="/js/theme-toggle.js" defer></script>
</body>
</html>
