<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Регистрация | CyberSquare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    #registerToast {
      min-width: 320px;
      border-radius: 16px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.18);
    }

    #registerToast .toast-body {
      font-weight: 500;
    }
  </style>
</head>
<body class="bg-light">

<header class="cs-header">
  <div class="container cs-header-inner">
    <a href="index.html" class="cs-logo">CyberSquare</a>

    <nav id="nav-links" class="cs-nav">
      <ul id="nav-ul" class="cs-nav-list"></ul>
    </nav>
    <button id="themeToggleBtn" class="btn btn-sm btn-outline-secondary" type="button">
  🌙 Тёмная
</button>
  </div>
</header>

<main class="container py-5" style="max-width:520px;">
  <div class="card cs-card p-4">
    <h1 class="h4 mb-3">Регистрация</h1>

    <form id="regForm" class="d-flex flex-column gap-3">
      <input class="form-control" type="text" id="full_name" placeholder="ФИО" required>
      <input class="form-control" type="email" id="email" placeholder="Email" required>
      <input class="form-control" type="password" id="password" placeholder="Пароль" required>
      <button class="btn btn-primary" id="registerBtn" type="submit">Создать аккаунт</button>
    </form>

    <div class="text-muted mt-3">
      Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
  </div>
</main>

<div id="footer-holder"></div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="registerToast" class="toast border-0 text-bg-dark" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="registerToastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
    </div>
  </div>
</div>

<script src="/js/nav.js" defer></script>
<script src="/js/footer.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function showRegisterToast(message, type = 'dark') {
    const toastEl = document.getElementById('registerToast');
    const toastBody = document.getElementById('registerToastBody');

    if (!toastEl || !toastBody) {
      alert(message);
      return;
    }

    toastBody.textContent = message;
    toastEl.className = 'toast border-0';

    const classMap = {
      success: 'text-bg-success',
      danger: 'text-bg-danger',
      warning: 'text-bg-warning',
      dark: 'text-bg-dark'
    };

    toastEl.classList.add(classMap[type] || 'text-bg-dark');

    if (!window.bootstrap || !bootstrap.Toast) {
      alert(message);
      return;
    }

    const toast = bootstrap.Toast.getOrCreateInstance(toastEl, {
      delay: 3200
    });

    toast.show();
  }

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const registerBtn = document.getElementById('registerBtn');

    const body = {
      full_name: document.getElementById('full_name').value.trim(),
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value
    };

    try {
      registerBtn.disabled = true;
      registerBtn.textContent = 'Создание...';

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const json = await res.json().catch(() => ({}));

      if (!res.ok) {
        showRegisterToast(json.error || 'Ошибка регистрации', 'danger');
        return;
      }

      showRegisterToast('Аккаунт создан! Теперь войдите.', 'success');

      setTimeout(() => {
        location.href = 'login.html';
      }, 2200);
    } catch (err) {
      console.error(err);
      showRegisterToast('API регистрации пока не подключён (это нормально).', 'warning');
    } finally {
      registerBtn.disabled = false;
      registerBtn.textContent = 'Создать аккаунт';
    }
  });
</script>
<script src="/js/theme-toggle.js" defer></script>
</body>
</html>
